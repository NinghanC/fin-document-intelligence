services:
  neo4j:
    image: neo4j:5.26-community
    container_name: finsight-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/local-password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: finsight-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: finsight-pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: finsight-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 10"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: finsight-kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 6

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight-api
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      ANONYMIZED_TELEMETRY: "false"
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_MODE: http
      CHROMA_HOST: chromadb
      PGVECTOR_DSN: postgresql://postgres:postgres@pgvector:5432/knowledge
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      API_STATE_DSN: postgresql://postgres:postgres@pgvector:5432/knowledge
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
      pgvector:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - ${USERPROFILE}/.aws:/root/.aws:ro

volumes:
  neo4j_data:
  chroma_data:
  pgvector_data:
  uploads:
